<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phantom Auth0</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #edf2ff, #f5f7fb 52%);
      color: #152033;
    }
    .card {
      width: min(92vw, 760px);
      background: white;
      border: 1px solid #d7ddea;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 14px 44px rgba(17, 31, 71, 0.08);
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      background: #e8f0ff;
      color: #1459ff;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 12px; font-size: 40px; line-height: 1.05; }
    p { margin: 0 0 18px; color: #5f6b7c; line-height: 1.6; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    a.button {
      text-decoration: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      background: #1459ff;
      color: white;
    }
    a.secondary {
      background: white;
      color: #152033;
      border: 1px solid #d7ddea;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="pill">Isolated Auth0 Hackathon Build</div>
    <h1>Phantom Auth0</h1>
    <p>
      A restricted local browser agent with a hosted Auth0 companion app for connected accounts,
      delegated Google and GitHub actions, and approval gates for high-risk operations.
    </p>
    <div class="row">
      <a class="button" href="/companion">Open Companion App</a>
      <a class="button secondary" href="https://github.com/youneslaaroussi/phantom-auth0">View Repo</a>
      <a class="button secondary" href="/privacy">Privacy</a>
      <a class="button secondary" href="/terms">Terms</a>
    </div>
  </div>
</body>
</html>
