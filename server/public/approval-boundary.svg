<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1825"/>
      <stop offset="100%" stop-color="#08111b"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8b63"/>
      <stop offset="100%" stop-color="#eb5424"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#eb5424"/>
    </marker>
  </defs>

  <rect width="1240" height="560" fill="url(#bg)"/>
  <rect x="32" y="32" width="1176" height="496" rx="28" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <text x="72" y="88" fill="#f3f7fb" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="34" font-weight="600">Approval Boundary Model</text>
  <text x="72" y="120" fill="#91a2b6" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="16">Different action classes carry different friction. Reads stay fast. Drafts stay reviewable. Writes can stop for approval.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="178" width="320" height="292" rx="28" fill="#101b28" stroke="rgba(255,255,255,0.08)"/>
    <text x="104" y="226" fill="#ff9a74" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2">LOW-RISK</text>
    <text x="104" y="264" fill="#f3f7fb" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="28" font-weight="600">Read immediately</text>
    <text x="104" y="300" fill="#8fa2b7" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="17">Examples: account status, repo listing, calendar availability, connection health.</text>
    <rect x="104" y="344" width="112" height="34" rx="17" fill="rgba(76,224,162,0.12)" stroke="rgba(76,224,162,0.24)"/>
    <text x="160" y="366" text-anchor="middle" fill="#90f0c4" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13" font-weight="600">No approval</text>
    <text x="104" y="414" fill="#bcc8d3" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="15">The companion still records execution so the user can inspect what was read and why.</text>

    <rect x="460" y="178" width="320" height="292" rx="28" fill="#101b28" stroke="rgba(255,255,255,0.08)"/>
    <text x="492" y="226" fill="#ff9a74" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2">REVERSIBLE</text>
    <text x="492" y="264" fill="#f3f7fb" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="28" font-weight="600">Draft or preview</text>
    <text x="492" y="300" fill="#8fa2b7" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="17">Examples: issue draft, pre-send email content, approval candidate payload.</text>
    <rect x="492" y="344" width="126" height="34" rx="17" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <text x="555" y="366" text-anchor="middle" fill="#f3f7fb" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13" font-weight="600">User reviewable</text>
    <text x="492" y="414" fill="#bcc8d3" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="15">The system prepares the action but still leaves a visible stop before irreversible external state changes.</text>

    <rect x="848" y="178" width="320" height="292" rx="28" fill="#101b28" stroke="rgba(235,84,36,0.24)"/>
    <text x="880" y="226" fill="#ff9a74" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2">HIGH-RISK</text>
    <text x="880" y="264" fill="#f3f7fb" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="28" font-weight="600">Require approval</text>
    <text x="880" y="300" fill="#8fa2b7" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="17">Examples: send email, create issue, post message, or mutate any external state.</text>
    <rect x="880" y="344" width="146" height="34" rx="17" fill="rgba(235,84,36,0.14)" stroke="rgba(235,84,36,0.28)"/>
    <text x="953" y="366" text-anchor="middle" fill="#ffb394" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13" font-weight="600">Approval boundary</text>
    <text x="880" y="414" fill="#bcc8d3" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="15">The companion shows the request, waits for consent, and only then allows execution to cross into the provider system.</text>
  </g>

  <path d="M392 324 H 460" fill="none" stroke="url(#orange)" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M780 324 H 848" fill="none" stroke="url(#orange)" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="592" y="514" text-anchor="middle" fill="#8fa2b7" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="14">The same companion surface records all three paths. Only the rightmost path inserts explicit approval before execution.</text>
</svg>
