<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" width="100%" height="100%">
  <defs>
    <linearGradient id="risk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eb5424" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#eb5424" stop-opacity="0.28"/>
    </linearGradient>
  </defs>

  <rect width="1240" height="560" fill="#070a0f"/>
  <rect x="24" y="24" width="1192" height="512" rx="28" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <text x="76" y="92" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="34" font-weight="600">Approval boundary model</text>
  <text x="76" y="124" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="16">Reads, drafts, and writes should not move through the same lane.</text>

  <rect x="76" y="182" width="1088" height="236" rx="26" fill="url(#risk)" stroke="rgba(255,255,255,0.08)"/>
  <line x1="256" y1="182" x2="256" y2="418" stroke="rgba(255,255,255,0.08)"/>
  <line x1="620" y1="182" x2="620" y2="418" stroke="rgba(255,255,255,0.08)"/>
  <line x1="930" y1="182" x2="930" y2="418" stroke="rgba(255,255,255,0.08)"/>

  <text x="108" y="226" fill="#cbc7bf" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="12" letter-spacing="2">LOW RISK</text>
  <text x="288" y="226" fill="#cbc7bf" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="12" letter-spacing="2">READ LANE</text>
  <text x="652" y="226" fill="#cbc7bf" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="12" letter-spacing="2">DRAFT LANE</text>
  <text x="962" y="226" fill="#cbc7bf" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="12" letter-spacing="2">WRITE LANE</text>

  <text x="288" y="280" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="28" font-weight="600">Read immediately</text>
  <text x="288" y="314" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="16">Account status, repo listing, availability checks.</text>
  <text x="288" y="360" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="15">No approval boundary</text>

  <text x="652" y="280" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="28" font-weight="600">Draft or preview</text>
  <text x="652" y="314" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="16">Issue drafts, pre-send payloads, reviewable output.</text>
  <text x="652" y="360" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="15">User can inspect before release</text>

  <text x="962" y="280" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="28" font-weight="600">Require approval</text>
  <text x="962" y="314" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="16">Creates, sends, posts, or other external writes.</text>
  <text x="962" y="360" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="15">Approval boundary before execution</text>

  <line x1="180" y1="470" x2="1060" y2="470" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="300" cy="470" r="8" fill="#eb5424"/>
  <circle cx="660" cy="470" r="8" fill="#eb5424"/>
  <circle cx="1000" cy="470" r="8" fill="#eb5424"/>
  <text x="180" y="500" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="14">As the action moves right, the trust requirement increases and the need for explicit consent becomes harder to ignore.</text>
</svg>
