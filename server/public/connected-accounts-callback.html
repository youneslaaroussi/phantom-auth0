<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalize Connected Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --text: #f3f7fb;
      --muted: #9caec0;
      --danger: #ff8f78;
      --line: rgba(157,173,193,0.16);
      --display: "Space Grotesk", sans-serif;
      --body: "IBM Plex Sans", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: var(--body);
      color: var(--text);
      background: linear-gradient(180deg, #08111a 0%, #050a10 100%);
    }
    .card {
      width: min(92vw, 560px);
      padding: 28px;
      background: linear-gradient(180deg, rgba(13,24,37,0.94), rgba(8,14,22,0.94));
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.24);
    }
    h1 {
      margin: 0 0 10px;
      font: 700 34px/0.98 var(--display);
      letter-spacing: -0.04em;
    }
    .muted {
      color: var(--muted);
      line-height: 1.75;
    }
    .error { color: var(--danger); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Finalizing delegated connection.</h1>
    <p id="status" class="muted">Please wait while Phantom Auth0 completes the connected-account flow.</p>
  </div>
  <script>
    async function complete() {
      const query = new URLSearchParams(window.location.search);
      const flowId =
        query.get("flowId") ||
        window.sessionStorage.getItem("phantom-auth0-connected-flow-id");
      const connectCode = query.get("connect_code");
      const status = document.getElementById("status");

      if (!flowId || !connectCode) {
        status.className = "error";
        status.textContent = "Missing flow ID or connect code. Return to the companion console and start the connection again.";
        return;
      }

      try {
        const response = await fetch("/api/accounts/complete", {
          method: "POST",
          credentials: "include",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            flowId,
            connectCode,
            redirectUri: `${window.location.origin}/connected-accounts/callback`,
          }),
        });
        const json = await response.json();
        if (!response.ok) {
          throw new Error(json.error || "Failed to complete account connection");
        }
        status.className = "muted";
        status.textContent = `Connected ${json.provider}. You can return to Phantom now.`;
        window.sessionStorage.removeItem("phantom-auth0-connected-flow-id");
        window.sessionStorage.removeItem("phantom-auth0-connected-provider");
        window.setTimeout(() => {
          window.close();
          if (!window.closed) {
            window.location.href = "/";
          }
        }, 1200);
      } catch (error) {
        status.className = "error";
        status.textContent = error.message;
      }
    }

    complete();
  </script>
</body>
</html>
