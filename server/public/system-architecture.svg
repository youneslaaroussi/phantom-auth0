<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 780" width="100%" height="100%">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eb5424" stop-opacity="0"/>
      <stop offset="50%" stop-color="#eb5424" stop-opacity="1"/>
      <stop offset="100%" stop-color="#eb5424" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9b78"/>
      <stop offset="100%" stop-color="#eb5424"/>
    </linearGradient>
  </defs>

  <rect width="1240" height="780" fill="#070a0f"/>
  <rect x="24" y="24" width="1192" height="732" rx="28" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <text x="76" y="92" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="34" font-weight="600">Phantom Auth0 system architecture</text>
  <text x="76" y="124" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="16">One path, three zones: local runtime, hosted control surface, external authority.</text>

  <line x1="120" y1="392" x2="1120" y2="392" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="120" y1="392" x2="1120" y2="392" stroke="url(#fade)" stroke-width="3"/>

  <line x1="414" y1="186" x2="414" y2="618" stroke="rgba(255,255,255,0.08)" stroke-dasharray="8 10"/>
  <line x1="792" y1="186" x2="792" y2="618" stroke="rgba(255,255,255,0.08)" stroke-dasharray="8 10"/>

  <text x="120" y="182" fill="#cbc7bf" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="12" letter-spacing="2" text-transform="uppercase">LOCAL RUNTIME</text>
  <text x="456" y="182" fill="#cbc7bf" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="12" letter-spacing="2" text-transform="uppercase">HOSTED CONTROL SURFACE</text>
  <text x="834" y="182" fill="#cbc7bf" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="12" letter-spacing="2" text-transform="uppercase">AUTH0 + PROVIDERS</text>

  <circle cx="226" cy="392" r="74" fill="none" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="226" cy="392" r="38" fill="none" stroke="rgba(235,84,36,0.4)"/>
  <circle cx="226" cy="392" r="10" fill="url(#spot)"/>
  <text x="120" y="532" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="26" font-weight="600">Phantom extension</text>
  <text x="120" y="562" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="15">Page context, browser tools, local interaction, pair requests.</text>

  <circle cx="604" cy="392" r="98" fill="none" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="604" cy="392" r="54" fill="none" stroke="rgba(235,84,36,0.4)"/>
  <circle cx="604" cy="392" r="10" fill="url(#spot)"/>
  <text x="472" y="532" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="26" font-weight="600">Companion + gateway</text>
  <text x="472" y="562" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="15">Actor state, connected accounts, action planning, approval visibility, history.</text>

  <circle cx="982" cy="392" r="74" fill="none" stroke="rgba(255,255,255,0.08)"/>
  <circle cx="982" cy="392" r="38" fill="none" stroke="rgba(235,84,36,0.4)"/>
  <circle cx="982" cy="392" r="10" fill="url(#spot)"/>
  <text x="850" y="532" fill="#f4f2ec" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="26" font-weight="600">Auth0 and providers</text>
  <text x="850" y="562" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="15">Identity, Connected Accounts, Token Vault, approval gates, provider APIs.</text>

  <path d="M226 392 C 316 392, 470 318, 604 318" fill="none" stroke="#eb5424" stroke-width="2.5"/>
  <path d="M604 318 C 706 318, 850 392, 982 392" fill="none" stroke="#eb5424" stroke-width="2.5"/>
  <path d="M604 466 C 734 466, 832 466, 982 466" fill="none" stroke="#eb5424" stroke-width="1.5" stroke-dasharray="7 10"/>

  <circle cx="604" cy="318" r="5" fill="#eb5424"/>
  <circle cx="982" cy="466" r="5" fill="#eb5424"/>

  <text x="306" y="302" fill="#cbc7bf" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13">pair request</text>
  <text x="678" y="302" fill="#cbc7bf" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13">delegated execution</text>
  <text x="736" y="492" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13">result + audit trail</text>

  <text x="120" y="668" fill="#aaa79f" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="14">The extension remains the operator. The hosted surface becomes the legible control plane. Auth0 becomes the authority boundary.</text>
</svg>
