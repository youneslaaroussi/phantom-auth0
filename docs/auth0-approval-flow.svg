<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" width="1400" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Approval boundaries for Phantom Auth0</title>
  <desc id="desc">Diagram showing low-risk actions executing immediately and high-risk actions going through Auth0 CIBA approval before completion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#09090c"/>
      <stop offset="100%" stop-color="#14151a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#18191f"/>
      <stop offset="100%" stop-color="#101116"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L11 7 L1 13" fill="none" stroke="#eb5424" stroke-width="2"/>
    </marker>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)"/>

  <text x="68" y="88" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">Approval-aware execution</text>
  <text x="68" y="124" fill="#9fa6b4" font-family="Arial, Helvetica, sans-serif" font-size="22">Low-risk reads and drafts stay fast. High-risk actions move through an explicit Auth0 approval boundary before the gateway executes them.</text>

  <rect x="68" y="188" rx="24" ry="24" width="1264" height="494" fill="#101116" stroke="#292b34"/>

  <g>
    <rect x="112" y="232" rx="20" ry="20" width="272" height="116" fill="url(#card)" stroke="#2d313c"/>
    <text x="144" y="278" fill="#eb5424" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">AGENT REQUEST</text>
    <text x="144" y="318" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Phantom asks to act</text>
    <text x="144" y="345" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="17">A gateway tool is planned from the local session.</text>
  </g>

  <g>
    <rect x="444" y="232" rx="20" ry="20" width="272" height="116" fill="url(#card)" stroke="#2d313c"/>
    <text x="476" y="278" fill="#eb5424" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">POLICY SPLIT</text>
    <text x="476" y="318" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Classify the action</text>
    <text x="476" y="345" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="17">Safe reads and drafts vs state-changing operations.</text>
  </g>

  <path d="M385 290 H443" fill="none" stroke="#eb5424" stroke-width="4" marker-end="url(#arrow)"/>

  <g>
    <rect x="148" y="430" rx="24" ry="24" width="458" height="190" fill="#13181f" stroke="#31435b"/>
    <text x="182" y="478" fill="#8bbcff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">LOW-RISK PATH</text>
    <text x="182" y="516" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Execute immediately</text>
    <text x="182" y="552" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="19">Examples</text>
    <text x="182" y="580" fill="#d9e7ff" font-family="Arial, Helvetica, sans-serif" font-size="18">Calendar availability, Gmail draft, GitHub repo listing, issue preview</text>
    <text x="182" y="612" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="18">The result is returned to the agent and written to action history.</text>
  </g>

  <g>
    <rect x="792" y="430" rx="24" ry="24" width="458" height="190" fill="#1c1512" stroke="#5c3522"/>
    <text x="826" y="478" fill="#ffb089" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">HIGH-RISK PATH</text>
    <text x="826" y="516" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Request approval first</text>
    <text x="826" y="552" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="19">Examples</text>
    <text x="826" y="580" fill="#ffd8c8" font-family="Arial, Helvetica, sans-serif" font-size="18">Gmail send, calendar event creation, GitHub issue creation, Slack post</text>
    <text x="826" y="612" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="18">The gateway creates an Auth0 auth request and waits for a decision.</text>
  </g>

  <path d="M580 349 C 520 388, 430 396, 348 428" fill="none" stroke="#6ea8ff" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M580 349 C 690 388, 870 396, 1008 428" fill="none" stroke="#eb5424" stroke-width="4" marker-end="url(#arrow)"/>

  <g>
    <rect x="864" y="232" rx="20" ry="20" width="390" height="116" fill="url(#card)" stroke="#2d313c"/>
    <text x="898" y="278" fill="#eb5424" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">AUTH0 APPROVAL SURFACE</text>
    <text x="898" y="318" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">CIBA and binding message</text>
    <text x="898" y="345" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="17">The user sees what is being requested before the gateway proceeds.</text>
  </g>

  <path d="M1020 430 V349" fill="none" stroke="#eb5424" stroke-width="4" marker-end="url(#arrow)"/>

  <g>
    <rect x="964" y="652" rx="16" ry="16" width="130" height="52" fill="#132017" stroke="#2d4f37"/>
    <text x="992" y="685" fill="#94e0a9" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Approved</text>
  </g>
  <g>
    <rect x="1112" y="652" rx="16" ry="16" width="130" height="52" fill="#231417" stroke="#5b2a34"/>
    <text x="1144" y="685" fill="#ff9ab1" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Rejected</text>
  </g>
  <text x="182" y="692" fill="#728096" font-family="Arial, Helvetica, sans-serif" font-size="17">Both paths update action history so the companion app and extension show what happened.</text>
</svg>
