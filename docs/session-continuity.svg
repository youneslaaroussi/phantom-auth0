<svg viewBox="0 -20 800 280" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:800px;margin:24px auto;display:block;font-family:'Google Sans',sans-serif">
  <defs>
    <filter id="sc"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
    <marker id="ac" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4285F4"/></marker>
    <marker id="acg" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34A853"/></marker>
    <marker id="acr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#EA4335"/></marker>
    <marker id="acgr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5F6368"/></marker>
  </defs>
  <rect y="-20" width="800" height="280" rx="16" fill="#f8f9fa" stroke="#e8eaed"/>
  <text x="400" y="8" text-anchor="middle" fill="#5F6368" font-size="11" font-weight="500">SESSION CONTINUITY — RECONNECT WITH CONVERSATION TRACE</text>

  <!-- Timeline -->
  <line x1="60" y1="70" x2="740" y2="70" stroke="#e8eaed" stroke-width="2"/>

  <!-- Session 1 -->
  <rect x="60" y="40" width="240" height="60" rx="10" fill="#34A853" filter="url(#sc)"/>
  <text x="180" y="66" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">Session 1 — Active</text>
  <text x="180" y="82" text-anchor="middle" fill="#e6f4ea" font-size="10">Agent: "Let me find pizza places..."</text>

  <!-- Disconnect -->
  <rect x="320" y="40" width="80" height="60" rx="10" fill="#EA4335" filter="url(#sc)"/>
  <text x="360" y="66" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">WS Drop</text>
  <text x="360" y="82" text-anchor="middle" fill="#fce8e6" font-size="9">code != 1000</text>

  <!-- Session 2 -->
  <rect x="420" y="40" width="310" height="60" rx="10" fill="#4285F4" filter="url(#sc)"/>
  <text x="575" y="66" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">Session 2 — Auto-Reconnected</text>
  <text x="575" y="82" text-anchor="middle" fill="#d2e3fc" font-size="10">Agent continues from where it left off</text>

  <!-- Transcript stash -->
  <rect x="60" y="120" width="340" height="54" rx="8" fill="#fff" stroke="#FBBC05" stroke-width="1.5" filter="url(#sc)"/>
  <text x="230" y="140" text-anchor="middle" fill="#1f1f1f" font-size="11" font-weight="500">Session Transcript (stashed on disconnect)</text>
  <text x="230" y="156" text-anchor="middle" fill="#5F6368" font-size="9">User: "order me a pizza" | Agent: "Searching nearest pizza places..." | Tool: openTab | ...</text>

  <!-- Arrow from transcript to session 2 -->
  <path d="M400,147 L418,147 L418,100" fill="none" stroke="#FBBC05" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Injected message -->
  <rect x="420" y="120" width="360" height="54" rx="8" fill="#e8f0fe" stroke="#4285F4" stroke-width="1"/>
  <text x="600" y="138" text-anchor="middle" fill="#4285F4" font-size="10" font-weight="500">[SYSTEM] You were disconnected mid-conversation.</text>
  <text x="600" y="152" text-anchor="middle" fill="#4285F4" font-size="10">Here is the conversation so far: ...</text>
  <text x="600" y="166" text-anchor="middle" fill="#5F6368" font-size="9">Last 30 transcript entries injected as first message</text>

  <!-- Bottom: what happens vs old behavior -->
  <rect x="60" y="196" width="340" height="42" rx="8" fill="#fce8e6" stroke="#EA4335" stroke-width="0.5"/>
  <text x="230" y="214" text-anchor="middle" fill="#EA4335" font-size="10" font-weight="500">Before: Agent says "Hi!" again (lost context)</text>
  <text x="230" y="228" text-anchor="middle" fill="#5F6368" font-size="9">User had to re-explain the entire task</text>

  <rect x="420" y="196" width="360" height="42" rx="8" fill="#e6f4ea" stroke="#34A853" stroke-width="0.5"/>
  <text x="600" y="214" text-anchor="middle" fill="#34A853" font-size="10" font-weight="500">After: Agent picks up exactly where it left off</text>
  <text x="600" y="228" text-anchor="middle" fill="#5F6368" font-size="9">"I was looking at pizza places — let me continue browsing the menu"</text>

</svg>
