<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 860" width="1400" height="860" role="img" aria-labelledby="title desc">
  <title id="title">Phantom Auth0 architecture</title>
  <desc id="desc">Auth0-styled architecture diagram showing the local Phantom extension, hosted companion app, Auth0 services, and delegated provider actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b0b0d"/>
      <stop offset="100%" stop-color="#151518"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#17171b"/>
      <stop offset="100%" stop-color="#111115"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L11 7 L1 13" fill="none" stroke="#eb5424" stroke-width="2"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1f2026" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect width="1400" height="860" fill="url(#grid)" opacity="0.45"/>

  <rect x="0" y="0" width="1400" height="72" fill="#09090b"/>
  <g transform="translate(38 20)">
    <path d="M22 0 L40 11 L40 34 L22 46 L4 34 L4 11 Z" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M22 8 L32 14 L32 28 L22 34 L12 28 L12 14 Z" fill="#ffffff" opacity="0.12"/>
    <text x="58" y="29" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">auth0</text>
    <text x="168" y="29" fill="#8d93a1" font-family="Arial, Helvetica, sans-serif" font-size="22">for AI Agents</text>
  </g>
  <text x="1160" y="45" fill="#eb5424" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Phantom Auth0</text>

  <text x="56" y="132" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Identity, delegation, and approval for a local browser agent</text>
  <text x="56" y="170" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="22">The agent stays local. Cross-app authority is delegated through Auth0 Connected Accounts, Token Vault, and explicit approval boundaries.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="230" rx="24" ry="24" width="360" height="250" fill="url(#panel)" stroke="#2a2c34"/>
    <text x="90" y="276" fill="#eb5424" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">LOCAL CLIENT</text>
    <text x="90" y="318" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Phantom extension</text>
    <text x="90" y="352" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="20">Voice UI, page context, tool routing,</text>
    <text x="90" y="380" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="20">pair token, local privacy behaviors</text>

    <rect x="90" y="408" rx="14" ry="14" width="135" height="38" fill="#201815" stroke="#4d2a1e"/>
    <text x="108" y="433" fill="#ffb39a" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Restricted mode</text>

    <rect x="245" y="408" rx="14" ry="14" width="135" height="38" fill="#131b20" stroke="#2d4656"/>
    <text x="272" y="433" fill="#9dd6ff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">No provider keys</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="230" rx="24" ry="24" width="360" height="250" fill="url(#panel)" stroke="#2a2c34"/>
    <text x="550" y="276" fill="#eb5424" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">HOSTED SURFACE</text>
    <text x="550" y="318" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Companion app + gateway</text>
    <text x="550" y="352" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="20">Pairing approval, account state,</text>
    <text x="550" y="380" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="20">delegated action history, API orchestration</text>

    <rect x="550" y="408" rx="14" ry="14" width="130" height="38" fill="#151b16" stroke="#2c4832"/>
    <text x="577" y="433" fill="#8fe3a7" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Audit trail</text>

    <rect x="695" y="408" rx="14" ry="14" width="155" height="38" fill="#161a21" stroke="#334258"/>
    <text x="720" y="433" fill="#a9cbff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Action planning</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="980" y="210" rx="24" ry="24" width="360" height="430" fill="url(#panel)" stroke="#2a2c34"/>
    <text x="1010" y="256" fill="#eb5424" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">AUTH0 CONTROL PLANE</text>
    <text x="1010" y="298" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Identity and delegated authority</text>

    <rect x="1012" y="328" rx="18" ry="18" width="296" height="70" fill="#11161f" stroke="#2b3e58"/>
    <text x="1040" y="357" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Universal Login + refresh tokens</text>
    <text x="1040" y="382" fill="#9ca8bd" font-family="Arial, Helvetica, sans-serif" font-size="16">User session, offline access, rotation</text>

    <rect x="1012" y="418" rx="18" ry="18" width="296" height="70" fill="#18141b" stroke="#4e3045"/>
    <text x="1040" y="447" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Connected Accounts</text>
    <text x="1040" y="472" fill="#c0a8bb" font-family="Arial, Helvetica, sans-serif" font-size="16">Google, GitHub, Slack consent linkage</text>

    <rect x="1012" y="508" rx="18" ry="18" width="296" height="70" fill="#201612" stroke="#5c3522"/>
    <text x="1040" y="537" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Token Vault exchange</text>
    <text x="1040" y="562" fill="#ffc3a5" font-family="Arial, Helvetica, sans-serif" font-size="16">Provider access without storing raw secrets</text>

    <rect x="1012" y="598" rx="18" ry="18" width="296" height="70" fill="#15181e" stroke="#32435f"/>
    <text x="1040" y="627" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Async approval with CIBA</text>
    <text x="1040" y="652" fill="#9ab7e5" font-family="Arial, Helvetica, sans-serif" font-size="16">Step-up for state-changing actions</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="560" rx="24" ry="24" width="820" height="220" fill="url(#panel)" stroke="#2a2c34"/>
    <text x="90" y="606" fill="#eb5424" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">PROVIDER SURFACES</text>
    <text x="90" y="648" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">What the agent can do after delegated authorization</text>

    <rect x="90" y="680" rx="16" ry="16" width="220" height="70" fill="#15181e" stroke="#39455c"/>
    <text x="116" y="710" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Google</text>
    <text x="116" y="735" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="16">Calendar availability, Gmail draft, send, create event</text>

    <rect x="340" y="680" rx="16" ry="16" width="220" height="70" fill="#15181e" stroke="#39455c"/>
    <text x="366" y="710" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">GitHub</text>
    <text x="366" y="735" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="16">Repo listing, issue draft, issue creation</text>

    <rect x="590" y="680" rx="16" ry="16" width="220" height="70" fill="#15181e" stroke="#39455c"/>
    <text x="616" y="710" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Slack</text>
    <text x="616" y="735" fill="#a7adba" font-family="Arial, Helvetica, sans-serif" font-size="16">Preview and post flow, not part of the core v1 path</text>
  </g>

  <path d="M421 356 C 455 356, 478 356, 520 356" fill="none" stroke="#eb5424" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M881 356 C 920 356, 930 356, 980 356" fill="none" stroke="#eb5424" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1160 671 C 1140 720, 1030 725, 882 720" fill="none" stroke="#eb5424" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="525" y="164" rx="18" ry="18" width="332" height="36" fill="#1e1411" stroke="#603121"/>
  <text x="551" y="188" fill="#ffc0a2" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">The trust boundary moves out of the agent and into Auth0</text>
</svg>
