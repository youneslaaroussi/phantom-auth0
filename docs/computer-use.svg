  <text x="400" y="158" text-anchor="middle" fill="#EA4335" font-size="10" font-weight="500">Coordinates scaled: image space → 1000x1000 grid → viewport pixels</text>
  <text x="400" y="172" text-anchor="middle" fill="#5F6368" font-size="9">Agent cursor animation shown at click target before dispatching real mouse events</text>
